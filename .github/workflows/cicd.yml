name: FastAPI CI/CD to Hugging Face Spaces

on:
  push:
    branches: [ "main" ] # รันเมื่อมีการ Push โค้ดเข้า Branch main
    paths:
      - 'api/**'         # ทริกเกอร์เฉพาะเมื่อมีการแก้โค้ดในโฟลเดอร์ api
      - '.github/workflows/**'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r api/requirements.txt
        pip install pytest httpx

    - name: Run pytest
      run: |
        cd api
        pytest test_main.py -v

  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: test # บังคับว่าต้องรอ Job 'test' ผ่าน 100% ก่อนถึงจะ Deploy
    environment: "Hugging Face"
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python for deployment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Upload api/ folder to Hugging Face Space
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        pip install huggingface_hub
        python - <<'EOF'
import os
from huggingface_hub import HfApi

api = HfApi()
api.upload_folder(
    folder_path="api",
    repo_id="Satapooh/car-classification-api",
    repo_type="space",
    token=os.environ["HF_TOKEN"],
)
print("Deploy to HF Space สำเร็จ!")
EOF